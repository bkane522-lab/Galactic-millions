<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#14002f" />
  <title>Galactic Lottery - Hors ligne</title>

  <style>
    :root {
      --bg: #05000d;
      --line: rgba(255,255,255,0.16);
      --text: #fff;
      --muted: rgba(255,255,255,0.72);
      --cyan: #36f5ff;
      --gold: #ffd166;
      --pink: #ff4ecd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,78,205,0.30), transparent 32%),
        radial-gradient(circle at 80% 15%, rgba(54,245,255,0.20), transparent 30%),
        linear-gradient(150deg, #030109, #14002f);
    }

    .card {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 28px;
      background: rgba(255,255,255,0.09);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      text-align: center;
      backdrop-filter: blur(16px);
    }

    .logo {
      width: 76px;
      height: 76px;
      margin: 0 auto 18px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 25%, #fff 0%, #ffe693 13%, #ff4ecd 34%, #7336ff 62%, #13002f 100%);
      font-size: 34px;
      box-shadow: 0 0 38px rgba(255,78,205,0.42);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.2rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    h1 span {
      background: linear-gradient(135deg, #fff, var(--cyan), var(--pink), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      color: var(--muted);
      line-height: 1.55;
      margin: 16px 0 0;
    }

    button {
      margin-top: 22px;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      color: #090015;
      background: linear-gradient(135deg, var(--cyan), var(--gold));
      font-weight: 950;
      cursor: pointer;
    }

    small {
      display: block;
      margin-top: 18px;
      color: rgba(255,255,255,0.48);
      line-height: 1.45;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo">✦</div>

    <h1>Mode <span>hors ligne</span></h1>

    <p>
      Galactic Lottery est installée, mais cette page n’a pas pu être chargée depuis le réseau.
      Reviens à l’accueil ou réessaie quand la connexion revient.
    </p>

    <button onclick="window.location.href='/'">Retour à l’accueil</button>

    <small>
      Application indépendante, non officielle FDJ. Aucun gain garanti.
    </small>
  </main>
</body>
</html>
