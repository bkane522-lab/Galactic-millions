<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080010" />
  <title>Galactic Lottery - Hors ligne</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5eeff;
      background:
        radial-gradient(circle at 20% 0%, rgba(142,82,255,0.28), transparent 32%),
        radial-gradient(circle at 80% 15%, rgba(244,200,74,0.16), transparent 30%),
        linear-gradient(150deg, #05000b, #130020);
    }

    .card {
      width: min(520px, 100%);
      border: 1px solid rgba(142,82,255,0.28);
      border-radius: 30px;
      padding: 28px;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      text-align: center;
      backdrop-filter: blur(16px);
    }

    .logo {
      font-size: 64px;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 22px rgba(244,200,74,0.6));
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3rem);
      color: #f4c84a;
      line-height: 1;
    }

    p {
      color: rgba(245,238,255,0.72);
      line-height: 1.55;
      margin: 16px 0 0;
    }

    button {
      margin-top: 22px;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      color: #160800;
      background: linear-gradient(135deg, #f4c84a, #fff0a8);
      font-weight: 950;
      cursor: pointer;
    }

    small {
      display: block;
      margin-top: 18px;
      color: rgba(245,238,255,0.36);
      line-height: 1.45;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo">🦁</div>

    <h1>Mode hors ligne</h1>

    <p>
      Galactic Lottery est installée, mais la connexion est indisponible.
      Reviens à l’accueil pour utiliser les fonctions déjà mises en cache.
    </p>

    <button onclick="window.location.href='/'">Retour à l’accueil</button>

    <small>
      Application indépendante, non officielle FDJ. Aucun gain garanti.
    </small>
  </main>
</body>
</html>
